# =============================================================================
# URSHI Manifest Schema Definition
# =============================================================================
# Version: 1.0.0
# Format: YAML Schema Definition
# Description: Formal schema specification for URSHI (Universal Remote Shell
#              Script Hosting Interface) manifest files
# =============================================================================

$schema: "http://yaml-schema.org/draft-07/schema#"
$id: "https://ursh.dev/spec/urshi-manifest.schema.yaml"
title: "URSHI Manifest"
description: |
  A URSHI manifest is a metadata specification for remote shell scripts that
  enables safe execution by declaring intentions, privileges, and compliance
  information. It serves as a replacement for "curl <url> | bash" patterns
  by providing structured metadata for human, LLM, and classical tool ingestion.

type: object
required:
  - name
  - description
  - url
  - checksum
  - date
  - privileges

properties:
  # -------------------------------------------------------------------------
  # Core Identification Fields
  # -------------------------------------------------------------------------

  name:
    type: string
    description: "The name of the tool/script"
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9][a-zA-Z0-9_-]*$"
    examples:
      - "hello-world"
      - "docker-setup"
      - "project-init"

  description:
    type: string
    description: "What the tool/script is supposed to do"
    minLength: 1
    maxLength: 2048
    examples:
      - "A simple hello world script for testing ursh"
      - "Sets up Docker containers for development environment"

  url:
    type: string
    format: uri
    description: |
      Where the script lives. Reputations are determined by this URL.
      For instance, github.com/microsoft is reputable while
      shady-url.ru is not. This is the primary source of truth for
      trust assessment.
    examples:
      - "https://github.com/microsoft/ursh-examples/blob/main/hello.sh"
      - "https://raw.githubusercontent.com/user/repo/main/script.sh"

  homepage:
    type: string
    format: uri
    description: "URL for more information about the tool/script"
    examples:
      - "https://github.com/microsoft/ursh-examples"
      - "https://example.com/project-docs"

  # -------------------------------------------------------------------------
  # Documentation Fields
  # -------------------------------------------------------------------------

  readme:
    type: string
    description: |
      README content or URL to README. Can be blank if not available.
      Should contain usage instructions, examples, and additional context.
    default: ""
    examples:
      - ""
      - "https://github.com/microsoft/ursh-examples/blob/main/README.md"
      - "# Usage\n\nRun this script to initialize your project..."

  license:
    type: string
    description: |
      License identifier or URL to license. Can be blank if not specified.
      Recommended to use SPDX license identifiers when possible.
    default: ""
    examples:
      - ""
      - "MIT"
      - "Apache-2.0"
      - "https://github.com/user/repo/blob/main/LICENSE"

  # -------------------------------------------------------------------------
  # Integrity & Verification Fields
  # -------------------------------------------------------------------------

  checksum:
    type: string
    description: "The last known checksum of the script for integrity verification"
    pattern: "^(sha256|sha512|md5):[a-fA-F0-9]+$"
    examples:
      - "sha256:a3f2b8c9d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1"
      - "sha512:abc123..."

  date:
    type: string
    format: date-time
    description: "ISO 8601 date of the last check/verification"
    examples:
      - "2024-01-15T10:30:00Z"
      - "2024-01-15T10:30:00+00:00"

  # -------------------------------------------------------------------------
  # Compliance & Certification Fields
  # -------------------------------------------------------------------------

  compliances:
    type: array
    description: |
      List of certifications the source page attests to (HIPAA, SOC-2, etc.)
      Empty array if no certifications apply.
    default: []
    items:
      type: string
      enum:
        - "HIPAA"
        - "SOC-2"
        - "SOC-2-Type-2"
        - "ISO-27001"
        - "GDPR"
        - "PCI-DSS"
        - "FedRAMP"
        - "HITRUST"
        - "CCPA"
        - "FISMA"
        - "NIST-800-53"
        - "CSA-STAR"
        - "IRAP"
        - "MTCS"
        - "ENS"
        - "C5"
        - "HDS"
        - "Custom"
      pattern: "^[A-Z0-9-]+$"
    examples:
      - []
      - ["HIPAA", "SOC-2"]
      - ["ISO-27001", "GDPR"]

  # -------------------------------------------------------------------------
  # Privileges & Permissions Fields
  # -------------------------------------------------------------------------

  privileges:
    type: object
    description: "Declaration of all privileges the script requires"
    required:
      - files
      - network
      - tools
      - dynamic
    properties:
      files:
        type: object
        description: "Files the script wants to access (read/write)"
        required:
          - read
          - write
        properties:
          read:
            type: array
            description: "List of file paths or patterns the script needs to read"
            default: []
            items:
              type: string
              description: "File path, glob pattern, or special path"
            examples:
              - []
              - ["/etc/hosts"]
              - ["~/.config/app/*"]
              - ["/tmp/*", "/var/log/app.log"]

          write:
            type: array
            description: "List of file paths or patterns the script needs to write"
            default: []
            items:
              type: string
              description: "File path, glob pattern, or special path"
            examples:
              - []
              - ["/tmp/output.txt"]
              - ["~/.local/bin/*"]
              - ["/var/log/app/*.log"]

      network:
        type: object
        description: |
          Network resources the script communicates with.
          Note: URLs that construct queries from file contents are considered 'put'
          operations even if using GET method.
        required:
          - get
          - put
        properties:
          get:
            type: array
            description: "URLs the script pulls data from (read-only operations)"
            default: []
            items:
              type: string
              format: uri
              description: "URL pattern for GET requests"
            examples:
              - []
              - ["https://api.example.com/data"]
              - ["https://cdn.example.com/assets/*"]

          put:
            type: array
            description: |
              URLs the script sends data to. This includes URLs where
              query parameters are constructed from file contents or
              computations (e.g., curl "somesite?q=$(cat file)").
            default: []
            items:
              type: string
              format: uri
              description: "URL pattern for PUT/POST requests or computed GET requests"
            examples:
              - []
              - ["https://api.example.com/submit"]
              - ["https://analytics.example.com/track?*"]

      tools:
        type: array
        description: "Tools the script wants to use with their scope"
        default: []
        items:
          type: object
          required:
            - name
            - scope
          properties:
            name:
              type: string
              description: "Name of the tool/command"
              minLength: 1
              examples:
                - "docker"
                - "git"
                - "mkdir"
                - "curl"

            scope:
              type: string
              description: |
                Scope of tool usage. Can be:
                - "unrestricted" - full access
                - "restricted" - limited to specific paths/operations
                - Specific path or argument constraints
              minLength: 1
              examples:
                - "unrestricted"
                - "/tmp"
                - "read-only"
                - "localhost:8080"
                - "~/.local/bin"

        examples:
          - []
          - [{"name": "docker", "scope": "unrestricted"}]
          - [{"name": "mkdir", "scope": "/tmp"}, {"name": "git", "scope": "~/projects"}]

      dynamic:
        type: array
        description: |
          Anything constructed programmatically, such as through
          generative AI, templates, or runtime computation.
        default: []
        items:
          type: object
          required:
            - what
            - how
          properties:
            what:
              type: string
              description: "What is being dynamically generated"
              minLength: 1
              examples:
                - "Configuration file content"
                - "API endpoint URLs"
                - "File paths"

            how:
              type: string
              description: "How it's generated (templates, AI, computation, etc.)"
              minLength: 1
              examples:
                - "Generative AI (LLM)"
                - "Shell variable substitution"
                - "Template engine (Jinja2)"
                - "Environment variable interpolation"

            source:
              type: string
              description: "Optional source of dynamic content"
              examples:
                - "https://api.openai.com/v1/chat/completions"
                - "Environment variables"
                - "User input"

        examples:
          - []
          - [{"what": "Config values", "how": "Environment variables"}]
          - [{"what": "API URLs", "how": "Generative AI", "source": "LLM template"}]

  # -------------------------------------------------------------------------
  # Optional Metadata Fields
  # -------------------------------------------------------------------------

  version:
    type: string
    description: "Version of the urshi manifest specification or script version"
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    examples:
      - "1.0.0"
      - "0.1.0"

  author:
    type: object
    description: "Author information"
    properties:
      name:
        type: string
        description: "Author name"
      email:
        type: string
        format: email
        description: "Author email"
      url:
        type: string
        format: uri
        description: "Author website or profile"

  tags:
    type: array
    description: "Tags for categorization and discovery"
    items:
      type: string
    examples:
      - ["setup", "development", "docker"]
      - ["utility", "networking"]

  dependencies:
    type: array
    description: "Other urshis or tools this script depends on"
    items:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "Name of the dependency"
        version:
          type: string
          description: "Version constraint"
        url:
          type: string
          format: uri
          description: "URL to the dependency"

  environment:
    type: object
    description: "Environment variables required by the script"
    additionalProperties:
      type: string
    examples:
      - {"API_KEY": "required", "DEBUG": "optional"}

additionalProperties: false

# =============================================================================
# Schema Validation Rules
# =============================================================================

# Custom validation rules (for implementation reference)
x-validation-rules:
  - rule: "url-domain-match"
    description: |
      If url and homepage share the same domain, verify they have
      matching author/organization paths. Flag for review if mismatched.
    severity: "warning"

  - rule: "privilege-minimization"
    description: |
      Privileges should follow principle of least privilege.
      Unrestricted scopes should be justified.
    severity: "info"

  - rule: "dynamic-disclosure"
    description: |
      All dynamic content generation must be disclosed in the
      dynamic privileges section.
    severity: "error"

  - rule: "checksum-required"
    description: |
      Checksum must be present and use a secure hash algorithm
      (SHA-256 or stronger recommended).
    severity: "error"
