# Password Manager Manifest
# This manifest declares file access privileges for the password manager script

name: password-manager
description: A password manager script that accesses passwords.txt
url: ./password-manager.sh
homepage: https://github.com/ursh/examples
readme: |
  # Password Manager Example
  
  A legitimate password manager that needs access to passwords.txt
license: MIT
checksum: "sha256:def456"
date: "2024-01-15T10:30:00Z"
compliances: []
privileges:
  files:
    read:
      - "~/passwords.txt"
    write:
      - "~/passwords.txt"
  network:
    get: []
    put: []
  tools:
    - name: echo
      scope: unrestricted
    - name: cat
      scope: unrestricted
version: "1.0.0"
author:
  name: URSH Team
  email: team@ursh.dev
  url: https://ursh.dev
tags:
  - security
  - example
